# i3status configuration file.
# see "man i3status" for documentation.

# It is important that this file is edited as UTF-8.
# The following line should contain a sharp s:
# ß
# If the above line is not correctly displayed, fix your editor first!

general {
    color = '#FFFFFF'
    color_good = '#FFFFFF'
    color_bad = '#FFFFFF'
    color_degraded = '#FFFFFF'
    interval = 5
    separator = true
}

#order += "hueshift"
#order += "window_title_async"
#order += "external_script"
order += "volume master"
order += "conky memory"
order += "conky filesystem"
order += "battery_level"
#order += "wireless _first_"
#order += "ethernet _first_"
order += "xrandr"
order += "clock"

window_title_async {
    format = '{title}'
    max_width = 60
}

external_script {
    format = "{output}"
    script_path = "python3 ~/Code/Python/todo/run.py"
}

volume master {
    format = "vol %volume"
    format_muted = "vol muted"
    device = "default"
    mixer = "Master"
    mixer_idx = 0
}

conky memory {
    color_good = '#FFFFFF'
    color_degraded = '#FFFF00'
    color_bad = '#FF0000'
    thresholds = [(0, 'good'), (75, 'degraded'), (85, 'bad')]
    format = '[\?color=memperc mem {memperc}%]'
}

conky filesystem {
    format = 'hdd {fs_free}'
}

hueshift {
    command = 'redshift'
    format = '{enabled} [\?if=enabled&color=darkgray disabled’ ‘|[\?color=color_temperature {color_temperature}K]]'
    maximum = 10000
    minimum = 1000
}

xrandr {
    force_on_change = ["eDP1+DP1", "eDP1+DP2", "eDP1"]
    force_on_start = "eDP1"
    fallback = "eDP1"
    format = "disp {output}"
    DP1_pos = "left-of eDP1"
    DP2_pos = "left-of eDP1"
}

wireless _first_ {
    #format_up = "wlan: %ip (%essid, %quality)"
    format_up = "wlan %essid"
    format_down = "wlan: down"
}

ethernet _first_ {
    # if you use %speed, i3status requires root privileges
    format_up = "lan %ip"
    format_down = "lan: down"
}

battery_level {
    color_good = '#FFFFFF'
    color_degraded = '#FFFF00'
    color_bad = '#FF0000'
    color_charging = '#4444FF'
    battery_id = 'all'
    hide_seconds = true
    hide_when_full = true
    notify_low_level = true
    threshold_full = 85
    threshold_degraded = 30
    threshold_bad = 10
    format = 'bat {time_remaining}h'
}

clock {
    format = "{Europe/Berlin}"
    format_time = "%a, KW %V, %d.%m.%y - %H:%M "
}
