# i3status configuration file.
# see "man i3status" for documentation.

# It is important that this file is edited as UTF-8.
# The following line should contain a sharp s:
# ß
# If the above line is not correctly displayed, fix your editor first!

general {
    color = '#FFFFFF'
    color_good = '#FFFFFF'
    color_bad = '#FFFFFF'
    color_degraded = '#FFFFFF'
    interval = 5
    separator = true
}

order += "external_script"
order += "volume master"
order += "conky memory"
order += "conky filesystem"
order += "battery 0"
order += "wireless _first_"
#order += "ethernet _first_"
order += "xrandr"
order += "clock"

external_script {
    format = "{output}"
    script_path = "python3 ~/Code/Python/todo/run.py"
}

volume master {
    format = "vol %volume"
    device = "default"
    mixer = "Master"
    mixer_idx = 0
}

conky memory {
    color_good = '#FFFFFF'
    color_degraded = '#FFFF00'
    color_bad = '#FF0000'
    thresholds = [(0, 'good'), (50, 'degraded'), (75, 'orange'), (85, 'bad')]
    format = 'mem [\?color=memperc {memperc}%]'
}

conky filesystem {
    format = 'hdd {fs_free}'
}

xrandr {
    force_on_change = ["eDP1+DP1", "eDP1"]
    force_on_start = "eDP1"
    fallback = "eDP1"
    format = "disp {output}"
    DP1_pos = "left-of eDP1"
}

wireless _first_ {
    #format_up = "wlan: %ip (%essid, %quality)"
    format_up = "wlan %essid"
    format_down = "wlan: down"
}

ethernet _first_ {
    # if you use %speed, i3status requires root privileges
    format_up = "lan %ip"
    format_down = "lan: down"
}

battery 0 {
    format = "bat %percentage %remaining"
    format_down = "No battery"
    path = "/sys/class/power_supply/BAT1/uevent"
}

clock {
    format = "{Europe/Berlin}"
    format_time = "%H:%M - %a, KW %V, %d.%m.%y"
}
