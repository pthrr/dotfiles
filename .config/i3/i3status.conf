# i3status configuration file.
# see "man i3status" for documentation.

# It is important that this file is edited as UTF-8.
# The following line should contain a sharp s:
# ß
# If the above line is not correctly displayed, fix your editor first!

general {
        color = '#FFFFFF'
        color_good = '#FFFFFF'
        color_bad = '#FFFFFF'
        color_degraded = '#FFFFFF'
        #colors = false
        separator = true
        interval = 5
}

order += "external_script"
order += "volume master"
order += "disk /"
order += "cpu_usage"
order += "battery 0"
order += "wireless _first_"
order += "ethernet _first_"
order += "xrandr"
order += "tztime local"

volume master {
    format = "♪ %volume"
    device = "default"
    mixer = "Master"
    mixer_idx = 0
}

cpu_usage {
        format = "🖳  %usage"
}

xrandr {
        force_on_change = ["eDP1+DP1", "eDP1"]
        force_on_start = "eDP1"
        DP1_pos = "left-of eDP1"
}

external_script {
        format = "m: {output}"
        script_path = "~/Code/Python/mem_usage/run.py"
}

wireless _first_ {
        format_up = "📡  %ip (%essid, %quality)"
        format_down = "📡  down"
}

ethernet _first_ {
        # if you use %speed, i3status requires root privileges
        format_up = "🖧  %ip (%speed)"
        format_down = "🖧  down"
}

battery 0 {
        format = "🔋  %percentage %remaining"
        format_down = "No battery"
        path = "/sys/class/power_supply/BAT1/uevent"
}

tztime local {
        format = "🕙  %H:%M - %a, KW %U, %d.%m.%Y"
}

disk {
        format = "💾  %avail"
}
